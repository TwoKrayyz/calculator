<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="txtBox">
      <input type="text" id="txtBox" class="txtBox" readonly>
    </div>
    <div class="numBtns">
      <button type="button" id="clrBtn" class="clrBtn">CLR</button>
      <button type="button" id="delBtn" class="delBtn"">DEL</button>
      <button type="button" id="addBtn" class="addBtn">+</button>
      <button type="button" id="subBtn" class="subBtn">-</button>
      <button type="button" id="mulBtn" class="mulBtn">x</button>
      <button type="button" id="divBtn" class="divBtn">/</button>
      <button type="button" id="zeroBtn" class="zeroBtn">0</button>
      <button type="button" id="oneBtn" class="oneBtn">1</button>
      <button type="button" id="twoBtn" class="twoBtn">2</button>
      <button type="button" id="threeBtn" class="threeBtn">3</button>
      <button type="button" id="fourBtn" class="fourBtn">4</button>
      <button type="button" id="fiveBtn" class="fiveBtn">5</button>
      <button type="button" id="sixBtn" class="sixBtn">6</button>
      <button type="button" id="sevenBtn" class="sevenBtn">7</button>
      <button type="button" id="eightBtn" class="eightBtn">8</button>
      <button type="button" id="nineBtn" class="nineBtn">9</button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
